<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>DevCoffe contatos</title>
    <form>
        <fieldset>
        <legend>solicitar reserva</legend>
          <div class="form-grid">
            <label for="nome">nome</label>
            <input type="text" id="nome" required>
            </div>
          <div class="form-grid">
            <label for="email">E-mail</label>
            <input type="email" id="email" placeholder="voce@exemplo.com" required>
          </div>
            <div class="form-grid">
            <label for="datareserva">data de reserva</label>
            <input type="date" id="datareserva" required>
          </div>
          <div class="form-grid">
            <label for="npessoa">numero de pessoas</label>
            <input type="number" min="1" max="20" id="npessoa" required>
          </div>
          <div class="form-grid">
            <label for="tel">telefone</label>
            <input type="tel" id="tel" placeholder="(xx)xx xxxxx xxxx" required>
          </div>
            <button type="submit">Confirmar Reserva</button>
        </fieldset>
    </form>
